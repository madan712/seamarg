spring.application.name=seamarg-backend
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
seamarg.security.admin.username=${SEAMARG_ADMIN_USERNAME:admin}
seamarg.security.admin.password=${SEAMARG_ADMIN_PASSWORD:}
seamarg.security.admin.role=${SEAMARG_ADMIN_ROLE:ADMIN}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI:}
seamarg.aws.region=${SEAMARG_AWS_REGION:${AWS_REGION:ap-south-1}}
seamarg.certificates.storage.bucket-name=${SEAMARG_DOCUMENT_BUCKET:}
seamarg.certificates.data.table-name=${SEAMARG_APP_DATA_TABLE:}
seamarg.certificates.max-upload-bytes=${SEAMARG_CERTIFICATE_MAX_UPLOAD_BYTES:10485760}
seamarg.certificates.download-url-ttl-seconds=${SEAMARG_CERTIFICATE_DOWNLOAD_URL_TTL_SECONDS:300}
seamarg.ai.openai.api-key=${OPENAI_API_KEY:}
seamarg.ai.openai.model=${SEAMARG_OPENAI_MODEL:gpt-5.5}
seamarg.cors.allowed-origins=${SEAMARG_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
