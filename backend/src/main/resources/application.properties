spring.application.name=seamarg-backend
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info
seamarg.security.admin.username=${SEAMARG_ADMIN_USERNAME:admin}
seamarg.security.admin.password=${SEAMARG_ADMIN_PASSWORD:}
seamarg.security.admin.role=${SEAMARG_ADMIN_ROLE:ADMIN}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI:}
seamarg.aws.region=${SEAMARG_AWS_REGION:${AWS_REGION:ap-south-1}}
seamarg.certificates.storage.bucket-name=${SEAMARG_DOCUMENT_BUCKET:}
seamarg.certificates.data.table-name=${SEAMARG_APP_DATA_TABLE:}
seamarg.app-data.table-name=${SEAMARG_APP_DATA_TABLE:}
seamarg.certificates.max-upload-bytes=${SEAMARG_CERTIFICATE_MAX_UPLOAD_BYTES:10485760}
# Servlet multipart limits must sit above seamarg.certificates.max-upload-bytes so the
# application-level size check (which returns a friendly JSON error) is the effective gate.
# Spring Boot defaults to a 1MB max-file-size, which silently rejected typical certificate
# scans before the controller ever ran.
spring.servlet.multipart.max-file-size=${SEAMARG_MULTIPART_MAX_FILE_SIZE:15MB}
spring.servlet.multipart.max-request-size=${SEAMARG_MULTIPART_MAX_REQUEST_SIZE:20MB}
seamarg.certificates.download-url-ttl-seconds=${SEAMARG_CERTIFICATE_DOWNLOAD_URL_TTL_SECONDS:300}
seamarg.ai.openai.api-key=${OPENAI_API_KEY:}
seamarg.ai.openai.model=${SEAMARG_OPENAI_MODEL:gpt-5.5}
seamarg.ai.minimax.api-key=${SEAMARG_MINIMAX_API_KEY:${MINIMAX_API_KEY:}}
seamarg.ai.minimax.base-url=${SEAMARG_MINIMAX_BASE_URL:https://api.minimax.io/v1}
# MiniMax-M3 is vision-capable and available on the api.minimax.io account; the older
# MiniMax-VL-01 returns "unknown model" there. Override per environment if needed.
seamarg.ai.minimax.model=${SEAMARG_MINIMAX_MODEL:MiniMax-M3}
seamarg.cors.allowed-origins=${SEAMARG_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
