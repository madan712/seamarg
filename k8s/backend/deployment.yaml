apiVersion: apps/v1
kind: Deployment
metadata:
  name: seamarg-backend
  namespace: seamarg
  labels:
    app.kubernetes.io/name: seamarg-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: seamarg-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seamarg-backend
    spec:
      containers:
        - name: seamarg-backend
          image: seamarg-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
