name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '24'

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Test backend
        run: ./gradlew :backend:test

      - name: Build backend container
        run: docker build -f backend/Dockerfile -t seamarg-backend:test .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck -w frontend

      - name: Build frontend
        run: npm run build -w frontend

  lambda:
    name: Lambda
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck Lambda
        run: npm run typecheck -w lambda

      - name: Build Lambda
        run: npm run build -w lambda

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/terraform

      - name: Initialize Terraform
        run: terraform -chdir=infra/terraform/environments/${{ matrix.environment }} init -backend=false

      - name: Validate Terraform
        run: terraform -chdir=infra/terraform/environments/${{ matrix.environment }} validate
