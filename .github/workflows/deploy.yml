name: Deploy

on:
  workflow_dispatch:
    inputs:
      unlock_deploy:
        description: Check this box to unlock deployment jobs.
        required: true
        type: boolean
        default: false
      target:
        description: Component to deploy.
        required: true
        type: choice
        default: backend
        options:
          - backend
          - frontend
          - lambda
          - all
      environment:
        description: GitHub Environment to deploy to.
        required: true
        type: choice
        default: dev
        options:
          - dev
          - staging
          - prod
      terraform_apply:
        description: Apply Terraform before deployment.
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '24'
  DEFAULT_AWS_REGION: eu-west-2

jobs:
  guard:
    name: Deployment guard
    runs-on: ubuntu-latest
    outputs:
      unlocked: ${{ steps.inputs.outputs.unlocked }}
      target: ${{ steps.inputs.outputs.target }}
      environment: ${{ steps.inputs.outputs.environment }}
      terraform_apply: ${{ steps.inputs.outputs.terraform_apply }}
    steps:
      - name: Read inputs
        id: inputs
        run: |
          echo "unlocked=${{ inputs.unlock_deploy }}" >> "$GITHUB_OUTPUT"
          echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          echo "terraform_apply=${{ inputs.terraform_apply }}" >> "$GITHUB_OUTPUT"

      - name: Locked
        if: ${{ inputs.unlock_deploy != true }}
        run: echo "Deployment is locked. Re-run the workflow and check unlock_deploy to deploy."

  terraform:
    name: Terraform
    needs: guard
    if: ${{ needs.guard.outputs.unlocked == 'true' && needs.guard.outputs.terraform_apply == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.guard.outputs.environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION || 'eu-west-2' }}
      TF_VAR_github_repository_full_name: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS deployment variables
        run: |
          test -n "${{ vars.AWS_ROLE_TO_ASSUME }}" || { echo "Set AWS_ROLE_TO_ASSUME as a GitHub Environment or repository variable."; exit 1; }
          test -n "$TF_STATE_BUCKET" || { echo "Set TF_STATE_BUCKET as a GitHub Environment or repository variable."; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: seamarg-terraform-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=seamarg/${{ needs.guard.outputs.environment }}/terraform.tfstate" -backend-config="region=${AWS_REGION}"

      - name: Plan Terraform
        run: terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} plan -input=false

      - name: Apply Terraform
        run: terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} apply -auto-approve -input=false

  deploy-backend:
    name: Deploy backend
    needs:
      - guard
      - terraform
    if: ${{ always() && needs.guard.outputs.unlocked == 'true' && (needs.guard.outputs.target == 'backend' || needs.guard.outputs.target == 'all') && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ needs.guard.outputs.environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-2' }}
      BACKEND_ECR_REPOSITORY: seamarg-${{ needs.guard.outputs.environment }}-backend
      EKS_CLUSTER_NAME: seamarg-${{ needs.guard.outputs.environment }}-eks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS deployment variables
        run: test -n "${{ vars.AWS_ROLE_TO_ASSUME }}" || { echo "Set AWS_ROLE_TO_ASSUME as a GitHub Environment or repository variable."; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: seamarg-backend-${{ github.run_id }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Build backend
        run: ./gradlew :backend:bootJar

      - name: Log in to Amazon ECR
        id: aws
        run: |
          account_id="$(aws sts get-caller-identity --query Account --output text)"
          registry="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$registry"
          echo "account_id=${account_id}" >> "$GITHUB_OUTPUT"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        id: image
        run: |
          image_uri="${{ steps.aws.outputs.registry }}/${BACKEND_ECR_REPOSITORY}:${GITHUB_SHA}"
          docker build -f backend/Dockerfile -t "$image_uri" .
          docker push "$image_uri"
          echo "image_uri=${image_uri}" >> "$GITHUB_OUTPUT"

      - name: Install kubectl
        run: |
          curl -fsSL -o kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Deploy backend
        run: ./scripts/deploy-backend.sh "${{ needs.guard.outputs.environment }}" "${{ steps.image.outputs.image_uri }}"

  deploy-frontend:
    name: Deploy frontend
    needs:
      - guard
      - terraform
    if: ${{ always() && needs.guard.outputs.unlocked == 'true' && (needs.guard.outputs.target == 'frontend' || needs.guard.outputs.target == 'all') && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ needs.guard.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -w frontend

      - name: Deploy frontend
        run: ./scripts/deploy-frontend.sh "${{ needs.guard.outputs.environment }}"

  deploy-lambda:
    name: Deploy Lambda
    needs:
      - guard
      - terraform
    if: ${{ always() && needs.guard.outputs.unlocked == 'true' && (needs.guard.outputs.target == 'lambda' || needs.guard.outputs.target == 'all') && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ needs.guard.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda
        run: npm run build -w lambda

      - name: Deploy Lambda
        run: ./scripts/deploy-lambda.sh "${{ needs.guard.outputs.environment }}"
