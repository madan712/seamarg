name: Deploy

on:
  workflow_dispatch:
    inputs:
      unlock_deploy:
        description: Check this box to unlock deployment jobs.
        required: true
        type: boolean
        default: false
      target:
        description: Component to deploy.
        required: true
        type: choice
        default: backend
        options:
          - backend
          - frontend
          - lambda
          - infra
          - all
      environment:
        description: GitHub Environment to deploy to.
        required: true
        type: choice
        default: dev
        options:
          - dev
      terraform_apply:
        description: Apply Terraform before deployment.
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '24'

jobs:
  guard:
    name: Deployment guard
    runs-on: ubuntu-latest
    outputs:
      unlocked: ${{ steps.inputs.outputs.unlocked }}
      target: ${{ steps.inputs.outputs.target }}
      environment: ${{ steps.inputs.outputs.environment }}
      terraform_apply: ${{ steps.inputs.outputs.terraform_apply }}
    steps:
      - name: Read inputs
        id: inputs
        run: |
          echo "unlocked=${{ inputs.unlock_deploy }}" >> "$GITHUB_OUTPUT"
          echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          echo "terraform_apply=${{ inputs.terraform_apply }}" >> "$GITHUB_OUTPUT"

      - name: Locked
        if: ${{ inputs.unlock_deploy != true }}
        run: echo "Deployment is locked. Re-run the workflow and check unlock_deploy to deploy."

  terraform:
    name: Terraform
    needs: guard
    if: ${{ needs.guard.outputs.unlocked == 'true' && needs.guard.outputs.terraform_apply == 'true' }}
    runs-on: ubuntu-latest
    environment: ${{ needs.guard.outputs.environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_github_repository_full_name: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS deployment variables
        run: |
          test -n "$AWS_REGION" || { echo "Set AWS_REGION as a GitHub Environment or repository variable."; exit 1; }
          test -n "${{ vars.AWS_ROLE_TO_ASSUME }}" || { echo "Set AWS_ROLE_TO_ASSUME as a GitHub Environment or repository variable."; exit 1; }
          test -n "$TF_STATE_BUCKET" || { echo "Set TF_STATE_BUCKET as a GitHub Environment or repository variable."; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: seamarg-terraform-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Initialize Terraform
        run: terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=seamarg/${{ needs.guard.outputs.environment }}/terraform.tfstate" -backend-config="region=${AWS_REGION}"

      - name: Plan Terraform
        run: terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} plan -input=false

      - name: Apply Terraform
        run: terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} apply -auto-approve -input=false

  deploy-frontend:
    name: Deploy frontend
    needs:
      - guard
      - terraform
    if: ${{ always() && needs.guard.outputs.unlocked == 'true' && (needs.guard.outputs.target == 'frontend' || needs.guard.outputs.target == 'all') && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ needs.guard.outputs.environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AWS deployment variables
        run: |
          test -n "$AWS_REGION" || { echo "Set AWS_REGION as a GitHub Environment or repository variable."; exit 1; }
          test -n "${{ vars.AWS_ROLE_TO_ASSUME }}" || { echo "Set AWS_ROLE_TO_ASSUME as a GitHub Environment or repository variable."; exit 1; }
          test -n "$TF_STATE_BUCKET" || { echo "Set TF_STATE_BUCKET as a GitHub Environment or repository variable."; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: seamarg-frontend-${{ github.run_id }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Initialize Terraform outputs
        run: terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=seamarg/${{ needs.guard.outputs.environment }}/terraform.tfstate" -backend-config="region=${AWS_REGION}"

      - name: Read frontend infrastructure outputs
        id: frontend_infra
        run: |
          output_error="$(mktemp)"
          if ! bucket_name="$(terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} output -raw frontend_bucket_name 2>"$output_error")"; then
            cat "$output_error"
            echo "Frontend infrastructure outputs are missing. Re-run this workflow with terraform_apply checked for ${{ needs.guard.outputs.environment }} first." >&2
            exit 1
          fi
          cloudfront_distribution_id="$(terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} output -raw frontend_cloudfront_distribution_id)"
          cloudfront_domain_name="$(terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} output -raw frontend_cloudfront_domain_name)"
          cognito_user_pool_id="$(terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} output -raw cognito_user_pool_id)"
          cognito_app_client_id="$(terraform -chdir=infra/terraform/environments/${{ needs.guard.outputs.environment }} output -raw cognito_app_client_id)"

          echo "bucket_name=${bucket_name}" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=${cloudfront_distribution_id}" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain_name=${cloudfront_domain_name}" >> "$GITHUB_OUTPUT"
          echo "cognito_user_pool_id=${cognito_user_pool_id}" >> "$GITHUB_OUTPUT"
          echo "cognito_app_client_id=${cognito_app_client_id}" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ steps.frontend_infra.outputs.cognito_user_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.frontend_infra.outputs.cognito_app_client_id }}
          VITE_API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL }}
        run: npm run build -w frontend

      - name: Deploy frontend
        run: ./scripts/deploy-frontend.sh "${{ needs.guard.outputs.environment }}" "frontend/dist" "${{ steps.frontend_infra.outputs.bucket_name }}" "${{ steps.frontend_infra.outputs.cloudfront_distribution_id }}" "${{ steps.frontend_infra.outputs.cloudfront_domain_name }}"

  deploy-backend:
    name: Deploy backend
    needs:
      - guard
      - terraform
    if: ${{ always() && needs.guard.outputs.unlocked == 'true' && (needs.guard.outputs.target == 'backend' || needs.guard.outputs.target == 'all') && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ needs.guard.outputs.environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      BACKEND_EC2_HOST: ${{ vars.BACKEND_EC2_HOST }}
      BACKEND_EC2_USER: ${{ vars.BACKEND_EC2_USER }}
      BACKEND_EC2_REMOTE_ROOT: ${{ vars.BACKEND_EC2_REMOTE_ROOT }}
      BACKEND_EC2_SECURITY_GROUP_ID: ${{ vars.BACKEND_EC2_SECURITY_GROUP_ID }}
      BACKEND_EC2_SSH_PRIVATE_KEY: ${{ secrets.BACKEND_EC2_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate backend deployment variables
        run: |
          test -n "$AWS_REGION" || { echo "Set AWS_REGION as a GitHub Environment or repository variable."; exit 1; }
          test -n "${{ vars.AWS_ROLE_TO_ASSUME }}" || { echo "Set AWS_ROLE_TO_ASSUME as a GitHub Environment or repository variable."; exit 1; }
          test -n "$BACKEND_EC2_SSH_PRIVATE_KEY" || { echo "Set BACKEND_EC2_SSH_PRIVATE_KEY as a GitHub Environment secret."; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          role-session-name: seamarg-backend-${{ github.run_id }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Build backend
        run: ./gradlew :backend:bootJar --no-daemon

      - name: Write SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$BACKEND_EC2_SSH_PRIVATE_KEY" > "$HOME/.ssh/seamarg-backend-ec2.pem"
          chmod 600 "$HOME/.ssh/seamarg-backend-ec2.pem"

      - name: Authorize runner SSH ingress
        id: ssh_ingress
        run: |
          security_group_id="${BACKEND_EC2_SECURITY_GROUP_ID:-sg-0edcb8bd177aa82d4}"
          runner_cidr="$(curl -fsS https://checkip.amazonaws.com)/32"
          echo "security_group_id=${security_group_id}" >> "$GITHUB_OUTPUT"
          echo "runner_cidr=${runner_cidr}" >> "$GITHUB_OUTPUT"
          cat > ssh-ingress.json <<EOF
          [
            {
              "IpProtocol": "tcp",
              "FromPort": 22,
              "ToPort": 22,
              "IpRanges": [
                {
                  "CidrIp": "${runner_cidr}",
                  "Description": "GitHub Actions backend deploy ${GITHUB_RUN_ID}"
                }
              ]
            }
          ]
          EOF

          if aws ec2 authorize-security-group-ingress \
            --region "$AWS_REGION" \
            --group-id "$security_group_id" \
            --ip-permissions file://ssh-ingress.json; then
            echo "authorized=true" >> "$GITHUB_OUTPUT"
          else
            status="$?"
            if aws ec2 describe-security-groups \
              --region "$AWS_REGION" \
              --group-ids "$security_group_id" \
              --query "SecurityGroups[0].IpPermissions[?FromPort==\`22\` && ToPort==\`22\`].IpRanges[?CidrIp==\`${runner_cidr}\`]" \
              --output text | grep -q "$runner_cidr"; then
              echo "authorized=false" >> "$GITHUB_OUTPUT"
              echo "SSH ingress already exists for ${runner_cidr}."
            else
              exit "$status"
            fi
          fi

      - name: Deploy backend to EC2
        run: |
          backend_host="${BACKEND_EC2_HOST:-ec2-13-233-83-132.ap-south-1.compute.amazonaws.com}"
          backend_user="${BACKEND_EC2_USER:-ec2-user}"
          remote_root="${BACKEND_EC2_REMOTE_ROOT:-/opt/seamarg}"
          ./scripts/deploy-backend-ec2.sh "${backend_user}@${backend_host}" "$HOME/.ssh/seamarg-backend-ec2.pem" "$remote_root"

      - name: Smoke test backend
        run: |
          backend_host="${BACKEND_EC2_HOST:-ec2-13-233-83-132.ap-south-1.compute.amazonaws.com}"
          for attempt in {1..30}; do
            if curl -fsS --max-time 5 "http://${backend_host}/api/public/hello"; then
              exit 0
            fi

            echo "Waiting for backend public endpoint (${attempt}/30)..."
            sleep 2
          done

          echo "Backend public smoke test failed after 60 seconds." >&2
          exit 1

      - name: Revoke runner SSH ingress
        if: ${{ always() && steps.ssh_ingress.outputs.authorized == 'true' }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --region "$AWS_REGION" \
            --group-id "${{ steps.ssh_ingress.outputs.security_group_id }}" \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.ssh_ingress.outputs.runner_cidr }}"

  deploy-lambda:
    name: Deploy Lambda
    needs:
      - guard
      - terraform
    if: ${{ always() && needs.guard.outputs.unlocked == 'true' && (needs.guard.outputs.target == 'lambda' || needs.guard.outputs.target == 'all') && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: ${{ needs.guard.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Lambda
        run: npm run build -w lambda

      - name: Deploy Lambda
        run: ./scripts/deploy-lambda.sh "${{ needs.guard.outputs.environment }}"
